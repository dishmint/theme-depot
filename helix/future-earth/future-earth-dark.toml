# Future Earth (dark) — an earthy, warm palette
# Dark mode uses color distinctions across syntax.

# --- Syntax ---
"comment" = "comment"
"comment.block.documentation" = "comment"

"keyword" = "red"
"keyword.control" = "red"
"keyword.control.conditional" = "red"
"keyword.control.repeat" = "red"
"keyword.control.import" = "red"
"keyword.control.return" = "red"
"keyword.control.exception" = "red"
"keyword.operator" = "red"
"keyword.directive" = "red"
"keyword.function" = "red"
"keyword.storage" = "red"
"keyword.storage.type" = "red"
"keyword.storage.modifier" = "red"

"operator" = "fg"

"function" = "yellow"
"function.builtin" = "yellow"
"function.method" = "yellow"
"function.macro" = "stone"
"function.special" = "stone"

"type" = "blue"
"type.builtin" = "blue"
"type.enum.variant" = "gold"
"constructor" = "blue"

"constant" = "gold"
"constant.builtin" = "gold"
"constant.character" = "gold"
"constant.character.escape" = "green_br"
"constant.numeric" = "gold"

"string" = "green"
"string.regexp" = "green"
"string.special" = "blue"
"string.special.path" = "green"
"string.special.url" = "blue"

"number" = "gold"

"variable" = "fg"
"variable.builtin" = "gold"
"variable.parameter" = "fg"
"variable.other.member" = "fg"

"label" = "stone"
"attribute" = "stone"
"namespace" = "blue"
"special" = "stone"

"punctuation" = "fg_dim"
"punctuation.delimiter" = "fg_dim"
"punctuation.bracket" = "fg_dim"
"punctuation.special" = "red"

"tag" = "blue"

# --- Markup (markdown, etc.) ---
"markup.heading" = { fg = "yellow", modifiers = ["bold"] }
"markup.heading.marker" = "comment"
"markup.list" = "red"
"markup.bold" = { modifiers = ["bold"] }
"markup.italic" = { modifiers = ["italic"] }
"markup.strikethrough" = { modifiers = ["crossed_out"] }
"markup.link.url" = { fg = "blue", modifiers = ["underlined"] }
"markup.link.text" = "blue_br"
"markup.link.label" = "stone"
"markup.quote" = "comment"
"markup.raw" = "green"
"markup.raw.inline" = "green"

# --- Diff ---
"diff.plus" = "green_br"
"diff.minus" = "red_br"
"diff.delta" = "gold"

# --- UI ---
"ui.background" = { bg = "bg" }
"ui.background.separator" = { fg = "border" }
"ui.text" = { fg = "fg" }
"ui.text.focus" = { fg = "fg", bg = "overlay" }
"ui.text.inactive" = { fg = "comment" }
"ui.window" = { fg = "border" }

"ui.cursor" = { fg = "bg", bg = "fg_dim" }
"ui.cursor.primary" = { fg = "bg", bg = "yellow" }
"ui.cursor.match" = { fg = "yellow", bg = "overlay" }
"ui.cursorline.primary" = { bg = "line" }

"ui.selection" = { bg = "overlay" }
"ui.selection.primary" = { bg = "overlay" }

"ui.linenr" = { fg = "comment" }
"ui.linenr.selected" = { fg = "fg_dim" }

"ui.statusline" = { fg = "fg", bg = "surface" }
"ui.statusline.inactive" = { fg = "comment", bg = "surface" }
"ui.statusline.normal" = { fg = "bg", bg = "blue", modifiers = ["bold"] }
"ui.statusline.insert" = { fg = "bg", bg = "green_br", modifiers = ["bold"] }
"ui.statusline.select" = { fg = "bg", bg = "yellow", modifiers = ["bold"] }

"ui.popup" = { fg = "fg", bg = "bg_alt" }
"ui.popup.info" = { fg = "fg", bg = "bg_alt" }
"ui.help" = { fg = "fg", bg = "bg_alt" }
"ui.menu" = { fg = "fg", bg = "bg_alt" }
"ui.menu.selected" = { fg = "bg", bg = "yellow" }
"ui.menu.scroll" = { fg = "fg_dim", bg = "surface" }

"ui.virtual.whitespace" = { fg = "border" }
"ui.virtual.ruler" = { bg = "surface" }
"ui.virtual.indent-guide" = { fg = "border" }
"ui.virtual.inlay-hint" = { fg = "comment", bg = "bg_alt" }
"ui.virtual.jump-label" = { fg = "red", modifiers = ["bold"] }

"ui.bufferline" = { fg = "comment", bg = "surface" }
"ui.bufferline.active" = { fg = "fg", bg = "bg" }

# --- Diagnostics ---
"diagnostic.error" = { underline = { color = "red_br", style = "curl" } }
"diagnostic.warning" = { underline = { color = "yellow", style = "curl" } }
"diagnostic.info" = { underline = { color = "blue_br", style = "curl" } }
"diagnostic.hint" = { underline = { color = "stone", style = "curl" } }
"error" = "red_br"
"warning" = "yellow"
"info" = "blue_br"
"hint" = "stone"

[palette]
bg       = "#1B1B1E"
bg_alt   = "#1E1E21"
surface  = "#27272A"
border   = "#2B2B2F"
overlay  = "#393A3C"
line     = "#222225"
fg       = "#FBFFFE"
fg_dim   = "#B0ACA7"
comment  = "#5C5C60"
red      = "#E06B6B"
red_br   = "#FF4D4D"
green    = "#6B8C5E"
green_br = "#8A9E7A"
yellow   = "#FAB025"
gold     = "#D4A04A"
blue     = "#4F8BA0"
blue_br  = "#6DA3B5"
stone    = "#9A9590"
