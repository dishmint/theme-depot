# Future Earth (light) — an earthy, warm palette
# Light mode leans on font weight (bold for functions/types) with minimal color.

# --- Syntax ---
"comment" = "comment"
"comment.block.documentation" = "comment"

"keyword" = "red"
"keyword.control" = "red"
"keyword.control.conditional" = "red"
"keyword.control.repeat" = "red"
"keyword.control.import" = "red"
"keyword.control.return" = "red"
"keyword.control.exception" = "red"
"keyword.operator" = "red"
"keyword.directive" = "red"
"keyword.function" = "red"
"keyword.storage" = "red"
"keyword.storage.type" = "red"
"keyword.storage.modifier" = "red"

"operator" = "fg"

"function" = { fg = "fg", modifiers = ["bold"] }
"function.builtin" = { fg = "fg", modifiers = ["bold"] }
"function.method" = { fg = "fg", modifiers = ["bold"] }
"function.macro" = "stone"
"function.special" = "stone"

"type" = { fg = "blue", modifiers = ["bold"] }
"type.builtin" = { fg = "blue", modifiers = ["bold"] }
"type.enum.variant" = "fg"
"constructor" = { fg = "blue", modifiers = ["bold"] }

"constant" = "fg"
"constant.builtin" = "fg"
"constant.character" = "fg"
"constant.character.escape" = "green"
"constant.numeric" = "fg"

"string" = "green"
"string.regexp" = "green"
"string.special" = "blue"
"string.special.path" = "green"
"string.special.url" = "blue"

"number" = "fg"

"variable" = "fg"
"variable.builtin" = "fg"
"variable.parameter" = "fg"
"variable.other.member" = "fg"

"label" = "stone"
"attribute" = "stone"
"namespace" = "blue"
"special" = "stone"

"punctuation" = "fg_dim"
"punctuation.delimiter" = "fg_dim"
"punctuation.bracket" = "fg_dim"
"punctuation.special" = "red"

"tag" = "blue"

# --- Markup (markdown, etc.) ---
"markup.heading" = { fg = "fg", modifiers = ["bold"] }
"markup.heading.marker" = "comment"
"markup.list" = "red"
"markup.bold" = { modifiers = ["bold"] }
"markup.italic" = { modifiers = ["italic"] }
"markup.strikethrough" = { modifiers = ["crossed_out"] }
"markup.link.url" = { fg = "blue", modifiers = ["underlined"] }
"markup.link.text" = "blue"
"markup.link.label" = "stone"
"markup.quote" = "comment"
"markup.raw" = "green"
"markup.raw.inline" = "green"

# --- Diff ---
"diff.plus" = "green_br"
"diff.minus" = "red_br"
"diff.delta" = "gold"

# --- UI ---
"ui.background" = { bg = "bg" }
"ui.background.separator" = { fg = "border" }
"ui.text" = { fg = "fg" }
"ui.text.focus" = { fg = "fg", bg = "surface" }
"ui.text.inactive" = { fg = "comment" }
"ui.window" = { fg = "border" }

"ui.cursor" = { fg = "bg", bg = "fg_dim" }
"ui.cursor.primary" = { fg = "bg", bg = "fg" }
"ui.cursor.match" = { fg = "fg", bg = "surface" }
"ui.cursorline.primary" = { bg = "line" }

"ui.selection" = { bg = "surface" }
"ui.selection.primary" = { bg = "surface" }

"ui.linenr" = { fg = "comment" }
"ui.linenr.selected" = { fg = "fg_dim" }

"ui.statusline" = { fg = "fg", bg = "bg_alt" }
"ui.statusline.inactive" = { fg = "comment", bg = "bg_alt" }
"ui.statusline.normal" = { fg = "bg", bg = "blue", modifiers = ["bold"] }
"ui.statusline.insert" = { fg = "bg", bg = "green", modifiers = ["bold"] }
"ui.statusline.select" = { fg = "bg", bg = "gold", modifiers = ["bold"] }

"ui.popup" = { fg = "fg", bg = "bg_alt" }
"ui.popup.info" = { fg = "fg", bg = "bg_alt" }
"ui.help" = { fg = "fg", bg = "bg_alt" }
"ui.menu" = { fg = "fg", bg = "bg_alt" }
"ui.menu.selected" = { fg = "bg", bg = "blue" }
"ui.menu.scroll" = { fg = "fg_dim", bg = "border" }

"ui.virtual.whitespace" = { fg = "border" }
"ui.virtual.ruler" = { bg = "bg_alt" }
"ui.virtual.indent-guide" = { fg = "border" }
"ui.virtual.inlay-hint" = { fg = "comment", bg = "bg_alt" }
"ui.virtual.jump-label" = { fg = "red", modifiers = ["bold"] }

"ui.bufferline" = { fg = "comment", bg = "bg_alt" }
"ui.bufferline.active" = { fg = "fg", bg = "bg" }

# --- Diagnostics ---
"diagnostic.error" = { underline = { color = "red_br", style = "curl" } }
"diagnostic.warning" = { underline = { color = "gold", style = "curl" } }
"diagnostic.info" = { underline = { color = "blue", style = "curl" } }
"diagnostic.hint" = { underline = { color = "stone", style = "curl" } }
"error" = "red_br"
"warning" = "gold"
"info" = "blue"
"hint" = "stone"

[palette]
bg       = "#FBFFFE"
bg_alt   = "#F6F6F3"
surface  = "#E3E8E6"
border   = "#E4E4E1"
line     = "#F1F2F0"
fg       = "#1B1B1E"
fg_dim   = "#797470"
comment  = "#B0B0AE"
red      = "#B54B4B"
red_br   = "#D93636"
green    = "#47593E"
green_br = "#6B8060"
yellow   = "#A8740D"
gold     = "#A8740D"
blue     = "#2D5A6B"
blue_br  = "#4F8BA0"
stone    = "#797470"
